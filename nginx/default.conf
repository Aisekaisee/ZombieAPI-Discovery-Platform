# Mock bank API gateway
# Only registered APIs are routed here
# Zombie and shadow APIs are intentionally absent from this config

server {
    listen 80;
    server_name localhost;

    # Access log for traffic analysis by log analyzer scanner
    access_log /var/log/nginx/access.log;

    # Active API v2 - accounts (fully supported, in production)
    location /api/v2/accounts {
        proxy_pass http://mock-active-1:3010;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Active API v2 - transfers (fully supported, in production)
    location /api/v2/transfers {
        proxy_pass http://mock-active-2:3011;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Deprecated API v1 - accounts (still registered but migration to v2 complete)
    location /api/v1/accounts {
        proxy_pass http://mock-deprecated:3012;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # NOTE: /api/v1/customers (port 3013) is NOT registered — zombie API
    # NOTE: /api/v1/loans (port 3014) is NOT registered — zombie API
    # NOTE: /internal/debug/users (port 3015) is NOT registered — shadow API

    # Gateway health check
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # Deny block placeholder — decommission engine (Task 09) inserts rules here
    # DENY_RULES_START
    # DENY_RULES_END
}
