services:
  postgres:
    image: postgres:16-alpine
    ports: ["5432:5432"]
    environment:
      POSTGRES_USER: zombieguard
      POSTGRES_PASSWORD: zombieguard
      POSTGRES_DB: zombieguard
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zombieguard"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  nginx:
    image: nginx:alpine
    ports: ["8888:80"]
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/access.log:/var/log/nginx/access.log
    depends_on:
      - mock-active-1
      - mock-active-2
      - mock-deprecated

  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    ports: ["8080:8080"]
    command: zap.sh -daemon -host 0.0.0.0 -port 8080 -config api.key=zombieguard-zap-key -config api.addrs.addr.name=.* -config api.addrs.addr.regex=true
    profiles: ["zap"] # Only starts with: docker-compose --profile zap up

  mock-active-1:
    build: ./mock-apis
    command: node active-api.js
    ports: ["3010:3010"]

  mock-active-2:
    build: ./mock-apis
    command: node active-api-2.js
    ports: ["3011:3011"]

  mock-deprecated:
    build: ./mock-apis
    command: node deprecated-api.js
    ports: ["3012:3012"]

  mock-zombie-1:
    build: ./mock-apis
    command: node zombie-api.js
    ports: ["3013:3013"]

  mock-zombie-2:
    build: ./mock-apis
    command: node zombie-api-2.js
    ports: ["3014:3014"]

  mock-shadow:
    build: ./mock-apis
    command: node shadow-api.js
    ports: ["3015:3015"]

  backend:
    build: ./backend
    ports: ["3000:3000"]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./nginx:/app/nginx
      - ./mock-apis:/app/mock-apis

  frontend:
    build: ./frontend
    ports: ["3001:3000"]
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
      NEXT_PUBLIC_WS_URL: http://localhost:3000
    depends_on:
      - backend

volumes:
  pgdata:
